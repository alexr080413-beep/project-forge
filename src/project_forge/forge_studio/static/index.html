<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forge Studio MVP</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Forge Studio navigation">
        <div class="brand-block">
          <img src="/assets/forge-logo.png" alt="Forge logo" class="brand-logo">
          <div>
            <div class="brand-title">Forge Studio</div>
            <div class="brand-kicker">Every Event. Every Inject. Every Exercise.</div>
          </div>
        </div>
        <nav class="nav-list">
          <button class="nav-item active" data-page="dashboard">Dashboard</button>
          <button class="nav-item" data-page="exercises">Exercises</button>
          <button class="nav-item" data-page="timeline">Timeline</button>
          <button class="nav-item" data-page="inject-library">Inject Library</button>
          <button class="nav-item" data-page="controllers">Controllers</button>
          <button class="nav-item" data-page="review-queue">Review Queue</button>
          <button class="nav-item" data-page="exercise-library">Exercise Library</button>
          <button class="nav-item" data-page="audit">Audit</button>
          <button class="nav-item" data-page="settings">Settings</button>
        </nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Human Command. Machine Assistance.</p>
            <h1 id="page-title">Dashboard</h1>
          </div>
          <div class="status-pill">Local MVP</div>
        </header>

        <section id="dashboard-page" class="page active-page">
          <div id="dashboard-grid" class="dashboard-grid"></div>

          <div class="work-grid">
            <section class="panel">
              <div class="panel-header">
                <h2>Latest Activity Feed</h2>
                <span>Current operational picture</span>
              </div>
              <div id="activity-list" class="activity-list"></div>
            </section>
            <section class="panel">
              <div class="panel-header">
                <h2>Timeline Summary</h2>
                <span>Chronological cards</span>
              </div>
              <div id="timeline-list" class="record-list"></div>
            </section>
          </div>
        </section>

        <section id="content-page" class="page">
          <div id="content-root"></div>
        </section>
      </main>
    </div>
    <script src="/design-system/components.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
