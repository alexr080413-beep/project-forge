<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forge Studio MVP</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell" id="app-shell">
      <aside class="sidebar" aria-label="Forge Studio navigation">
        <div class="brand-block">
          <img src="/assets/forge-logo.png" alt="Forge logo" class="brand-logo">
          <div>
            <div class="brand-title">Forge Studio</div>
            <div class="brand-kicker">Every Event. Every Inject. Every Exercise.</div>
          </div>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Collapse navigation">Collapse</button>
        <nav id="nav-list" class="nav-list" aria-label="Workspace navigation"></nav>
      </aside>

      <main class="main-panel">
        <header class="global-header">
          <div class="global-title">
            <p class="eyebrow">Forge Studio</p>
            <h1 id="page-title">Mission Control</h1>
            <nav id="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumbs"></nav>
          </div>
          <div class="context-selectors">
            <label>
              <span>Organization</span>
              <select id="organization-selector" aria-label="Current organization"></select>
            </label>
            <label>
              <span>Exercise</span>
              <select id="exercise-selector" aria-label="Current exercise"></select>
            </label>
          </div>
          <div class="header-actions">
            <span id="exercise-status-pill" class="status-pill">Local MVP</span>
            <button id="global-search-button" class="header-icon-button" type="button" aria-label="Global search">Search</button>
            <button class="header-icon-button" type="button" aria-label="Notifications">Alerts</button>
            <button class="header-icon-button" type="button" aria-label="User menu">User</button>
          </div>
        </header>

        <section id="dashboard-page" class="page active-page">
          <div id="dashboard-grid" class="dashboard-grid"></div>

          <div class="work-grid">
            <section class="panel">
              <div class="panel-header">
                <h2>Latest Activity Feed</h2>
                <span>Current operational picture</span>
              </div>
              <div id="activity-list" class="activity-list"></div>
            </section>
            <section class="panel">
              <div class="panel-header">
                <h2>Timeline Summary</h2>
                <span>Chronological cards</span>
              </div>
              <div id="timeline-list" class="record-list"></div>
            </section>
          </div>
        </section>

        <section id="content-page" class="page">
          <div id="content-root"></div>
        </section>
      </main>
    </div>
    <div id="modal-backdrop" class="modal-backdrop" hidden>
      <section id="command-palette" class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="command-palette-title" hidden>
        <div class="modal-header">
          <h2 id="command-palette-title">Command Palette</h2>
          <button class="modal-close" type="button" data-close-modal>Close</button>
        </div>
        <input id="command-input" class="modal-search" placeholder="Type a command..." aria-label="Command search">
        <div id="command-results" class="modal-results"></div>
      </section>
      <section id="global-search-modal" class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="global-search-title" hidden>
        <div class="modal-header">
          <h2 id="global-search-title">Global Search</h2>
          <button class="modal-close" type="button" data-close-modal>Close</button>
        </div>
        <input id="global-search-input" class="modal-search" placeholder="Search exercises, injects, products..." aria-label="Global search">
        <div id="global-search-results" class="modal-results"></div>
      </section>
    </div>
    <script src="/design-system/components.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
